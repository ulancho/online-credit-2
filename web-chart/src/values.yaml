image:
  repository: ${projectDocker}/${projectName}
  tag: ${projectVersion}
  pullPolicy: IfNotPresent
  containerPort: 80

resources: { }

nodeSelector: { }
tolerations: [ ]
affinity: { }

strategy:
  rollingUpdate:
    maxSurge: 25%
    maxUnavailable: 0%

replicas:
  init: 1
  min: 1
  max: 1

revisionHistoryLimit: 5

service:
  type: ClusterIP
  nodePort: 30032
