variables:
  DOCKER_DRIVER: overlay2
  KUBECTL_IMAGE: registry.cbk.kg/internal/infrastructure/kubectl:latest
  TRANSFER_METER_FREQUENCY: "1s"

stages:
  - build-and-push
  - development
  - production

build-and-push:
  stage: build-and-push
  image: ${CI_DEPENDENCY_PROXY_DIRECT_GROUP_IMAGE_PREFIX}/node:18-alpine
  services:
    - docker:dind
  before_script:
    - apk add --no-cache docker  # Устанавливаем Docker в Alpine
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  cache:
    key: $CI_COMMIT_REF_SLUG-$CI_PROJECT_DIR
    paths:
      - node_modules/
    policy: pull
  script:
    - npm install
    - VITE_BASE_PATH=/${CI_PROJECT_NAME}/ CI=false npm run build
    - docker pull $CI_REGISTRY_IMAGE:latest || true
    - docker build --cache-from $CI_REGISTRY_IMAGE:latest --tag $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA --tag $CI_REGISTRY_IMAGE:latest .
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA
  artifacts:
    expire_in: 1 hour
    paths:
      - build/
  only:
    - main

deploy_to_dev:
  stage: development
  image:
    name: $KUBECTL_IMAGE
    entrypoint: ['']
  script:
    - kubectl config use-context internal/k8s:dboservices
    - export NAMESPACE=$(echo $CI_PROJECT_NAMESPACE | sed 's|/|-|g')
    - envsubst < manifests/manifest_dev.yaml | kubectl apply -f -
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: never
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
    - if: $CI_MERGE_REQUEST_ID
  needs:
    - build-and-push

deploy_to_prod:
  stage: production
  image:
    name: $KUBECTL_IMAGE
    entrypoint: ['']
  script:
    - kubectl config use-context internal/k8s:dbos-prod
    - export NAMESPACE=$(echo $CI_PROJECT_NAMESPACE | sed 's|/|-|g')
    - envsubst < manifests/manifest_prod.yaml | kubectl apply -f -
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: never
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
    - if: $CI_MERGE_REQUEST_ID
  needs:
    - build-and-push