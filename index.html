<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/mbank-logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0 viewport-fit=cover" />
    <script>
      (() => {
        const params = new URLSearchParams(window.location.search);
        const theme = params.get('theme')?.toLowerCase();
        const resolvedTheme = theme === 'dark' ? 'dark' : 'light';
        const fallbackBg = resolvedTheme === 'dark' ? '#050506' : '#eff0f1';

        document.documentElement.setAttribute('data-theme', resolvedTheme);
        document.documentElement.style.backgroundColor = fallbackBg;

        if (document.body) {
          document.body.style.backgroundColor = fallbackBg;
        } else {
          window.addEventListener(
                  'DOMContentLoaded',
                  () => {
                    document.body.style.backgroundColor = fallbackBg;
                  },
                  { once: true },
          );
        }
      })();
    </script>
    <title>Online credit</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
